<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>Multisay 视频创作与翻译工具</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #f5f5f5;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
            color: #666;
        }
        
        /* 基础样式 */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .app-header {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .app-title {
            color: white;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .app-description {
            color: rgba(255, 255, 255, 0.8);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        
        .reset-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .app-content {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .sidebar-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .main-content {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .app-footer {
            background: rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }
        
        /* 组件样式 */
        h2 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
        }
        
        .section-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            background: #fafafa;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        input[type="file"]:hover {
            border-color: #667eea;
        }
        
        .language-selection {
            display: flex;
            gap: 15px;
        }
        
        .language-group {
            flex: 1;
        }
        
        .language-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        .language-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn.primary {
            background: #667eea;
            color: white;
        }
        
        .btn.primary:hover {
            background: #5a6fd8;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .supported-formats ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .supported-formats li {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        
        .document-preview {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .document-info h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .document-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .document-page-preview {
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .page-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .page-number {
            color: #667eea;
        }
        
        .page-content {
            color: #666;
            line-height: 1.5;
        }
        
        .translation-steps {
            margin-top: 20px;
        }
        
        .step {
            padding: 8px 0;
            color: #666;
            border-left: 3px solid #eee;
            padding-left: 15px;
            margin: 5px 0;
        }
        
        video {
            width: 100%;
            max-width: 640px;
            border-radius: 6px;
            margin: 15px 0;
        }
        
        .output-path {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div>
            <div class="spinner"></div>
            正在加载应用...
        </div>
    </div>
</body>
</html>
